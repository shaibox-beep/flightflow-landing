<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightFlow — Introduction</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;background:#1a1c18;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  }
  .brand{text-align:center;margin-bottom:32px}
  .brand-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .brand-name span{color:#b08a38}
  .brand-sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px}
  .video-wrap{
    width:100%;max-width:360px;border-radius:16px;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.6);background:#000;position:relative;
    padding-top:177.78%;
  }
  .video-wrap iframe{
    position:absolute;inset:0;width:100%;height:100%;border:none;
  }
  footer{margin-top:24px;font-size:12px;color:rgba(255,255,255,.25)}
</style>
</head>
<body>
  <div class="brand">
    <div class="brand-name">FlightFlow/<span> Anderson Air</span></div>
    <div class="brand-sub">Flows in.. Flaws out.</div>
  </div>
  <div class="video-wrap">
    <iframe
      src="https://www.youtube.com/embed/qKAybv5qdYI?rel=0&modestbranding=1"
      title="FlightFlow Introduction"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
  <footer>&copy; 2026 Flight Flow</footer>
</body>
</html>
